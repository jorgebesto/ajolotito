<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ajolotito Dulce Ventas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
:root {
  --brown-dark:#4a2512; --brown:#7b3f1e; --brown-mid:#a0522d; --brown-light:#c8845a;
  --cream:#fdf6ee; --cream-dark:#f5e9d8; --pink:#f4a0b0; --pink-deep:#e8607a;
  --warm-white:#fffaf5; --gold:#d4943a; --gold-light:#f0c87a;
  --green:#4caf7d; --shadow:0 4px 20px rgba(74,37,18,0.15); --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--brown-dark);min-height:100vh;background-image:radial-gradient(circle at 5% 10%,rgba(244,160,176,0.12) 0%,transparent 35%),radial-gradient(circle at 95% 85%,rgba(123,63,30,0.07) 0%,transparent 35%)}
header{background:linear-gradient(160deg,var(--brown-dark) 0%,var(--brown) 55%,#6b2f18 100%);padding:18px 16px 22px;text-align:center;position:relative;overflow:hidden;box-shadow:0 6px 30px rgba(74,37,18,0.4)}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 50%,rgba(244,160,176,0.1) 0%,transparent 55%),radial-gradient(ellipse at 75% 50%,rgba(212,148,58,0.1) 0%,transparent 55%);pointer-events:none}
.hi{position:relative;z-index:1}
.logo-img{width:110px;height:110px;object-fit:contain;filter:drop-shadow(0 6px 18px rgba(0,0,0,0.35));animation:float 3.5s ease-in-out infinite;display:block;margin:0 auto 4px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hsub{color:var(--gold-light);font-size:0.85rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.dbadge{display:inline-block;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.22);backdrop-filter:blur(4px);padding:5px 14px;border-radius:20px;color:var(--cream);font-size:0.78rem;font-weight:700}
.spill{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;color:rgba(255,255,255,0.8);margin-top:8px;cursor:pointer}
.sdot{width:8px;height:8px;border-radius:50%;background:#888;transition:background 0.4s;flex-shrink:0}
.sdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot.err{background:var(--pink-deep);box-shadow:0 0 6px var(--pink-deep)}
.sdot.load{background:var(--gold);animation:blink 0.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
main{max-width:960px;margin:0 auto;padding:18px 14px 150px}
.stitle{font-family:'Pacifico',cursive;font-size:1.1rem;color:var(--brown);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:2px;background:linear-gradient(to right,var(--brown-light),transparent);border-radius:2px}
.plog{background:var(--warm-white);border-radius:var(--r);border:2px solid var(--cream-dark);box-shadow:var(--shadow);overflow:hidden}
.plogh{background:linear-gradient(135deg,var(--green),#3a9a65);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.plogh span{color:#fff;font-weight:900;font-size:0.9rem}
.pcnt{background:rgba(255,255,255,0.25);color:#fff;border-radius:20px;padding:2px 10px;font-size:0.8rem;font-weight:900}
.pempty{padding:16px;text-align:center;color:var(--brown-light);font-size:0.82rem;font-style:italic}
.pitem{padding:10px 16px;border-bottom:1px solid var(--cream-dark);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;animation:iin 0.35s ease}
@keyframes iin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.pitem:last-child{border-bottom:none}
.pleft{flex:1;min-width:0}
.ptime{font-size:0.68rem;font-weight:700;color:var(--brown-light);margin-bottom:3px}
.pprods{font-size:0.8rem;font-weight:700;color:var(--brown-dark);line-height:1.5;word-break:break-word}
.pright{text-align:right;flex-shrink:0}
.ptot{font-size:0.95rem;font-weight:900;color:var(--green)}
.punit{font-size:0.7rem;color:var(--brown-light);font-weight:600}
.bdel{background:none;border:none;cursor:pointer;color:var(--pink-deep);font-size:1rem;padding:2px 4px;opacity:0.55;transition:opacity 0.2s;touch-action:manipulation;flex-shrink:0}
.bdel:hover{opacity:1}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:11px}
@media(max-width:400px){.pgrid{grid-template-columns:1fr 1fr;gap:9px}}
.pcard{background:var(--warm-white);border-radius:var(--r);padding:14px 11px 10px;box-shadow:var(--shadow);border:2px solid var(--cream-dark);transition:all 0.22s ease;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pink-deep),var(--gold));border-radius:var(--r) var(--r) 0 0}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(74,37,18,0.2);border-color:var(--pink)}
.pcard.hs{border-color:var(--gold);background:#fffbf3}
.pcard.hs::before{background:linear-gradient(90deg,var(--gold),var(--brown-light))}
.pemi{font-size:1.8rem;display:block;margin-bottom:4px}
.pname{font-weight:900;font-size:0.83rem;color:var(--brown-dark);line-height:1.3;margin-bottom:2px}
.pdesc{font-size:0.7rem;color:var(--brown-light);font-weight:600;margin-bottom:6px}
.pprice{font-size:0.98rem;font-weight:900;color:var(--brown);margin-bottom:9px}
.crow{display:flex;align-items:center;justify-content:space-between;background:var(--cream-dark);border-radius:12px;padding:3px;gap:2px}
.crow.sold{background:#f9f0df}
.bcnt{width:34px;height:34px;border:none;border-radius:9px;font-size:1.2rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;touch-action:manipulation;user-select:none}
.bminus{background:#fff;color:var(--pink-deep);box-shadow:0 2px 6px rgba(232,96,122,0.15)}
.bminus:hover,.bminus:active{background:var(--pink-deep);color:#fff;transform:scale(1.08)}
.bplus{background:linear-gradient(135deg,var(--brown),var(--brown-mid));color:#fff;box-shadow:0 2px 8px rgba(74,37,18,0.3)}
.bplus:hover,.bplus:active{background:var(--brown-dark);transform:scale(1.08)}
.cdsp{font-size:1.15rem;font-weight:900;min-width:26px;text-align:center;color:var(--brown-dark)}
.csub{text-align:center;font-size:0.7rem;font-weight:700;color:var(--brown-light);margin-top:5px}
.csub span{color:var(--gold)}
.abox{background:var(--warm-white);border-radius:var(--r);padding:16px 14px;border:2px dashed var(--brown-light);box-shadow:var(--shadow)}
.abox h3{font-family:'Pacifico',cursive;font-size:0.92rem;color:var(--brown);margin-bottom:12px}
.aform{display:grid;grid-template-columns:2fr 1fr 56px;gap:8px;align-items:end}
@media(max-width:500px){.aform{grid-template-columns:1fr 1fr}.badd{grid-column:1/-1}}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:0.7rem;font-weight:800;color:var(--brown-mid);text-transform:uppercase;letter-spacing:0.5px}
.fg input{border:2px solid var(--cream-dark);border-radius:10px;padding:8px 10px;font-family:'Nunito',sans-serif;font-size:0.86rem;color:var(--brown-dark);background:var(--cream);outline:none;transition:border-color 0.2s;width:100%}
.fg input:focus{border-color:var(--brown-mid)}
.badd{background:linear-gradient(135deg,var(--brown),var(--brown-mid));color:#fff;border:none;border-radius:12px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:0.86rem;font-weight:900;cursor:pointer;transition:all 0.2s;white-space:nowrap;touch-action:manipulation}
.badd:hover{background:var(--brown-dark);transform:translateY(-2px)}
.lbar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--brown-dark) 0%,#3a1a08 100%);padding:8px 14px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:nowrap;box-shadow:0 -4px 24px rgba(74,37,18,0.4);z-index:100;border-top:2px solid rgba(212,148,58,0.3)}
.lstats{display:flex;gap:12px;align-items:center;flex-shrink:0}
.lstat{display:flex;flex-direction:column;align-items:center}
.lstat .lb{font-size:0.58rem;color:rgba(255,255,255,0.5);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;line-height:1}
.lstat .lv{font-size:0.95rem;font-weight:900;color:#fff;line-height:1.25}
.lstat .lv.mo{color:var(--gold-light)}
.lstat .lv.un{color:var(--pink)}
.lstat .lv.gr{color:#7de8b0}
.lbtns{display:flex;gap:7px;flex-shrink:0}
.bpar{background:linear-gradient(135deg,var(--green),#3a9a65);color:#fff;border:none;border-radius:12px;padding:10px 13px;font-family:'Nunito',sans-serif;font-size:0.84rem;font-weight:900;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(76,175,125,0.4);white-space:nowrap;touch-action:manipulation}
.bpar:hover{transform:translateY(-2px)}
.bpar:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.bfin{background:linear-gradient(135deg,var(--pink-deep),#c04060);color:#fff;border:none;border-radius:12px;padding:10px 13px;font-family:'Nunito',sans-serif;font-size:0.84rem;font-weight:900;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(232,96,122,0.4);white-space:nowrap;touch-action:manipulation}
.bfin:hover{transform:translateY(-2px)}
.bfin:disabled{opacity:0.35;cursor:not-allowed;transform:none}
@media(max-width:380px){.lstats{gap:8px}.lstat .lv{font-size:0.82rem}.bpar,.bfin{padding:9px 9px;font-size:0.76rem}}
.mov{position:fixed;inset:0;background:rgba(30,12,4,0.72);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fin 0.25s ease}
@media(min-width:600px){.mov{align-items:center;padding:20px}}
@keyframes fin{from{opacity:0}to{opacity:1}}
.modal{background:var(--warm-white);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 50px rgba(0,0,0,0.3);animation:sup 0.3s ease;-webkit-overflow-scrolling:touch}
@media(min-width:600px){.modal{border-radius:24px;max-width:540px;animation:sci 0.3s ease}}
@keyframes sup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes sci{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.mhead{background:linear-gradient(160deg,var(--brown-dark),var(--brown));padding:20px 18px 16px;text-align:center;position:sticky;top:0;z-index:1;border-radius:24px 24px 0 0}
.mlogo{width:54px;height:54px;object-fit:contain;margin-bottom:5px;filter:drop-shadow(0 3px 10px rgba(0,0,0,0.3))}
.mhead h2{font-family:'Pacifico',cursive;color:var(--gold-light);font-size:1.25rem}
.mhead p{color:rgba(255,255,255,0.65);font-size:0.75rem;margin-top:3px}
.mbody{padding:16px 15px 20px}
.tbox{background:linear-gradient(135deg,var(--brown-dark),var(--brown));border-radius:16px;padding:16px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.tbox::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(212,148,58,0.2) 0%,transparent 60%)}
.tbox .tl{font-size:0.7rem;font-weight:800;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:1.5px;position:relative}
.tbox .tm{font-family:'Pacifico',cursive;font-size:2rem;color:var(--gold-light);margin:4px 0;position:relative}
.tbox .tu{font-size:0.78rem;color:rgba(255,255,255,0.65);font-weight:600;position:relative}
.tbox .tp{font-size:0.75rem;color:rgba(255,255,255,0.45);font-weight:600;position:relative;margin-top:2px}
.dsec{margin-bottom:14px}
.dsec h4{font-size:0.72rem;font-weight:800;color:var(--brown-mid);text-transform:uppercase;letter-spacing:0.8px;padding:6px 0;border-bottom:2px solid var(--cream-dark);margin-bottom:8px}
.stbl{width:100%;border-collapse:collapse}
.stbl th{text-align:left;font-size:0.66rem;font-weight:800;color:var(--brown-mid);text-transform:uppercase;letter-spacing:0.5px;padding:6px 5px;border-bottom:2px solid var(--cream-dark)}
.stbl td{padding:8px 5px;font-size:0.83rem;border-bottom:1px solid var(--cream-dark);vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.eji{font-size:1.1rem;width:28px}
.qbadge{background:var(--cream-dark);border:1.5px solid var(--brown-light);color:var(--brown-dark);border-radius:8px;padding:2px 7px;font-weight:900;font-size:0.82rem}
.scol{font-weight:900;color:var(--brown);text-align:right}
.prow{display:flex;align-items:center;padding:7px 4px;border-bottom:1px solid var(--cream-dark);font-size:0.82rem;gap:6px}
.prow:last-child{border-bottom:none}
.prt{color:var(--brown-light);font-weight:700;font-size:0.7rem;width:44px;flex-shrink:0}
.pri{flex:1;color:var(--brown-dark);font-weight:600;word-break:break-word}
.prto{color:var(--green);font-weight:900;flex-shrink:0}
.macts{display:flex;gap:9px;margin-top:4px}
.breset{flex:1;background:var(--cream-dark);color:var(--brown);border:2px solid var(--brown-light);border-radius:12px;padding:11px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.2s;touch-action:manipulation}
.breset:hover{background:var(--brown-dark);color:#fff;border-color:var(--brown-dark)}
.bclose{flex:1;background:linear-gradient(135deg,var(--pink-deep),#c04060);color:#fff;border:none;border-radius:12px;padding:11px;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.2s;touch-action:manipulation}
.bclose:hover{transform:translateY(-2px)}
.toast{position:fixed;top:14px;right:14px;background:var(--brown-dark);border-left:4px solid var(--gold);color:#fff;padding:9px 15px;border-radius:12px;font-size:0.83rem;font-weight:700;z-index:400;box-shadow:0 4px 20px rgba(0,0,0,0.25);max-width:calc(100vw - 28px);animation:tin 0.3s ease,tout 0.3s ease 2.2s forwards}
.toast.g{border-left-color:var(--green)}
.toast.r{border-left-color:var(--pink-deep)}
@keyframes tin{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes tout{to{opacity:0;transform:translateX(40px)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--cream-dark)}
::-webkit-scrollbar-thumb{background:var(--brown-light);border-radius:10px}
</style>
</head>

  {id:5,name:"Brownie",               price:3000,qty:0,emoji:"🟫",desc:"Unidad"},
  {id:6,name:"Liberales",             price:2000,qty:0,emoji:"🍬",desc:"Paquete x4"}
];
var nextId   = 10;
var parciales = [];
var syncing  = false;

function setSyncUI(state, msg) {
  document.getElementById('sdot').className = 'sdot ' + state;
  document.getElementById('stxt').textContent = msg;
}

async function readBin() {
  var res = await fetch(BIN_URL + "/latest", {
    headers: { "X-Master-Key": MASTER_KEY, "X-Access-Key": ACCESS_KEY }
  });
  if (!res.ok) throw new Error("Error leyendo: " + res.status);
  var j = await res.json();
  return j.record;
}

async function writeBin(data) {
  var res = await fetch(BIN_URL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": MASTER_KEY,
      "X-Access-Key": ACCESS_KEY
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error("Error guardando: " + res.status);
}

function buildPayload() {
  return {
    parciales: parciales,
    catalog: products.map(function(p) { return {id:p.id,name:p.name,price:p.price,emoji:p.emoji,desc:p.desc}; }),
    nextId: nextId
  };
}

async function syncNow() {
  if (syncing) return;
  syncing = true;
  setSyncUI('load', 'Sincronizando...');
  try {
    var remote = await readBin();
    if (remote) {
      if (remote.parciales && Array.isArray(remote.parciales)) {
        var localIds = {};
        parciales.forEach(function(p) { localIds[p.id] = true; });
        remote.parciales.forEach(function(rp) {
          if (!localIds[rp.id]) parciales.push(rp);
        });
        parciales.sort(function(a,b) { return a.id < b.id ? -1 : 1; });
      }
      if (remote.catalog && Array.isArray(remote.catalog)) {
        remote.catalog.forEach(function(rc) {
          if (!products.find(function(p) { return p.id === rc.id; })) {
            products.push({id:rc.id,name:rc.name,price:rc.price,emoji:rc.emoji,desc:rc.desc,qty:0});
          }
        });
      }
      if (remote.nextId && remote.nextId > nextId) nextId = remote.nextId;
    }
    await writeBin(buildPayload());
    setSyncUI('ok', 'Sincronizado ✓');
    renderParciales();
    renderProducts();
    updateBar();
  } catch(e) {
    console.error(e);
    setSyncUI('err', 'Error: ' + e.message);
    toast('⚠️ ' + e.message, 'r');
  }
  syncing = false;
}

setInterval(syncNow, 10000);

function renderProducts() {
  var grid = document.getElementById('pgrid');
  grid.innerHTML = '';
  products.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'pcard' + (p.qty > 0 ? ' hs' : '');
    card.innerHTML =
      '<span class="pemi">' + p.emoji + '</span>' +
      '<div class="pname">' + p.name + '</div>' +
      '<div class="pdesc">' + p.desc + '</div>' +
      '<div class="pprice">$' + p.price.toLocaleString('es-CO') + '</div>' +
      '<div class="crow ' + (p.qty>0?'sold':'') + '">' +
        '<button class="bcnt bminus" onclick="change(' + p.id + ',-1)">−</button>' +
        '<span class="cdsp">' + p.qty + '</span>' +
        '<button class="bcnt bplus"  onclick="change(' + p.id + ',+1)">+</button>' +
      '</div>' +
      '<div class="csub">Subtotal: <span>$' + (p.qty*p.price).toLocaleString('es-CO') + '</span></div>';
    grid.appendChild(card);
  });
  updateBar();
}

function renderParciales() {
  var body = document.getElementById('pbody');
  var cnt  = document.getElementById('pcnt');
  cnt.textContent = parciales.length + (parciales.length===1?' venta':' ventas');
  if (!parciales.length) {
    body.innerHTML = '<div class="pempty">Aún no hay ventas parciales ☁️</div>';
    return;
  }
  body.innerHTML = '';
  var rev = parciales.slice().reverse();
  rev.forEach(function(par) {
    var div = document.createElement('div');
    div.className = 'pitem';
    var items = par.items.map(function(i) { return i.emoji+' '+i.name+' x'+i.qty; }).join(' · ');
    div.innerHTML =
      '<div class="pleft">' +
        '<div class="ptime">🕐 ' + par.time + '</div>' +
        '<div class="pprods">' + items + '</div>' +
      '</div>' +
      '<div class="pright">' +
        '<div class="ptot">$' + par.total.toLocaleString('es-CO') + '</div>' +
        '<div class="punit">' + par.units + ' unid.</div>' +
      '</div>' +
      '<button class="bdel" onclick="delParcial(\'' + par.id + '\')">✕</button>';
    body.appendChild(div);
  });
}

function updateBar() {
  var su = products.reduce(function(s,p){return s+p.qty;},0);
  var sm = products.reduce(function(s,p){return s+p.qty*p.price;},0);
  var dt = parciales.reduce(function(s,p){return s+p.total;},0);
  document.getElementById('bunits').textContent = su;
  document.getElementById('bmoney').textContent = '$'+sm.toLocaleString('es-CO');
  document.getElementById('btotal').textContent = '$'+dt.toLocaleString('es-CO');
  document.getElementById('bpar').disabled = su===0;
  document.getElementById('bfin').disabled = parciales.length===0 && su===0;
}

function change(id, delta) {
  var p = products.find(function(x){return x.id===id;});
  if (!p) return;
  p.qty = Math.max(0, p.qty+delta);
  renderProducts();
  if (delta>0) toast('+1 '+p.emoji+' '+p.name);
}

async function registrarParcial() {
  var items = products.filter(function(p){return p.qty>0;}).map(function(p){
    return {id:p.id,name:p.name,qty:p.qty,price:p.price,emoji:p.emoji,desc:p.desc};
  });
  if (!items.length) return;
  var total = items.reduce(function(s,i){return s+i.qty*i.price;},0);
  var units = items.reduce(function(s,i){return s+i.qty;},0);
  var time  = new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  var par   = {id:'p_'+Date.now(), time:time, items:items, total:total, units:units};
  parciales.push(par);
  products.forEach(function(p){p.qty=0;});
  renderProducts();
  renderParciales();
  updateBar();
  toast('💾 Venta guardada · $'+total.toLocaleString('es-CO'), 'g');
  setSyncUI('load','Guardando...');
  try {
    await writeBin(buildPayload());
    setSyncUI('ok','Sincronizado ✓');
  } catch(e) {
    setSyncUI('err','Error al guardar');
    toast('⚠️ No se guardó en la nube','r');
  }
}

async function delParcial(pid) {
  parciales = parciales.filter(function(p){return p.id!==pid;});
  renderParciales();
  updateBar();
  toast('Venta eliminada');
  try { await writeBin(buildPayload()); setSyncUI('ok','Sincronizado ✓'); } catch(e) {}
}

function addProduct() {
  var name  = document.getElementById('nname').value.trim();
  var price = parseInt(document.getElementById('nprice').value);
  var emoji = document.getElementById('nemoji').value.trim() || '🍡';
  if (!name)            return toast('⚠️ Escribe el nombre','r');
  if (!price||price<1)  return toast('⚠️ Precio inválido','r');
  products.push({id:nextId++,name:name,price:price,emoji:emoji,desc:'Unidad',qty:0});
  renderProducts();
  document.getElementById('nname').value='';
  document.getElementById('nprice').value='';
  document.getElementById('nemoji').value='';
  toast('¡Producto agregado! 🎀');
  try { writeBin(buildPayload()); } catch(e) {}
}

function showResumen() {
  var pending = products.filter(function(p){return p.qty>0;});
  var cons = {};
  parciales.forEach(function(par) {
    par.items.forEach(function(i) {
      if (!cons[i.id]) cons[i.id]={name:i.name,emoji:i.emoji,desc:i.desc,price:i.price,qty:0};
      cons[i.id].qty += i.qty;
    });
  });
  pending.forEach(function(p) {
    if (!cons[p.id]) cons[p.id]={name:p.name,emoji:p.emoji,desc:p.desc,price:p.price,qty:0};
    cons[p.id].qty += p.qty;
  });
  var arr = Object.values(cons).filter(function(c){return c.qty>0;});
  var gt  = arr.reduce(function(s,c){return s+c.qty*c.price;},0);
  var gu  = arr.reduce(function(s,c){return s+c.qty;},0);
  var tv  = parciales.length+(pending.length>0?1:0);
  var now = new Date();
  var ds  = now.toLocaleDateString('es-CO',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var ts  = now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('mtitle').textContent = '🎉 Cierre del Día';
  document.getElementById('mdate').textContent  = ds.charAt(0).toUpperCase()+ds.slice(1)+' · '+ts;
  var html = '<div class="tbox"><div class="tl">💰 Total recaudado hoy</div><div class="tm">$'+gt.toLocaleString('es-CO')+'</div><div class="tu">'+gu+' unidad'+(gu!==1?'es':'')+' vendida'+(gu!==1?'s':'')+'</div><div class="tp">'+tv+' venta'+(tv!==1?'s':'')+' parcial'+(tv!==1?'es':'')+'</div></div>';
  if (arr.length) {
    html += '<div class="dsec"><h4>📦 Resumen por Producto</h4><table class="stbl"><thead><tr><th></th><th>Producto</th><th>Precio</th><th>Total</th><th style="text-align:right">Subtotal</th></tr></thead><tbody>';
    arr.forEach(function(c) {
      html += '<tr><td class="eji">'+c.emoji+'</td><td><strong>'+c.name+'</strong><br><small style="color:var(--brown-light)">'+c.desc+'</small></td><td>$'+c.price.toLocaleString('es-CO')+'</td><td><span class="qbadge">'+c.qty+'</span></td><td class="scol">$'+(c.qty*c.price).toLocaleString('es-CO')+'</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  if (parciales.length) {
    html += '<div class="dsec"><h4>🕐 Historial ('+parciales.length+' venta'+(parciales.length!==1?'s':'')+')</h4>';
    parciales.forEach(function(par) {
      html += '<div class="prow"><span class="prt">'+par.time+'</span><span class="pri">'+par.items.map(function(i){return i.emoji+'x'+i.qty;}).join(' ')+'</span><span class="prto">$'+par.total.toLocaleString('es-CO')+'</span></div>';
    });
    if (pending.length) {
      var pt = pending.reduce(function(s,p){return s+p.qty*p.price;},0);
      html += '<div class="prow" style="background:rgba(76,175,125,0.1);border-radius:8px"><span class="prt" style="color:var(--green)">Ahora</span><span class="pri">'+pending.map(function(p){return p.emoji+'x'+p.qty;}).join(' ')+'</span><span class="prto">$'+pt.toLocaleString('es-CO')+'</span></div>';
    }
    html += '</div>';
  }
  html += '<div class="macts"><button class="breset" onclick="resetDay()">🔄 Nueva jornada</button><button class="bclose" onclick="closeModal()">✅ Cerrar</button></div>';
  document.getElementById('mcontent').innerHTML = html;
  document.getElementById('mov').style.display = 'flex';
}

async function resetDay() {
  if (!confirm('¿Reiniciar toda la jornada? Se borrarán todas las ventas 🥺')) return;
  parciales = [];
  products.forEach(function(p){p.qty=0;});
  closeModal();
  renderProducts();
  renderParciales();
  updateBar();
  toast('¡Nueva jornada lista! 🌸','g');
  try { await writeBin(buildPayload()); setSyncUI('ok','Sincronizado ✓'); } catch(e) {}
}

function closeModal() { document.getElementById('mov').style.display='none'; }
function closeOut(e) { if(e.target===document.getElementById('mov')) closeModal(); }

function toast(msg, type) {
  document.querySelectorAll('.toast').forEach(function(t){t.remove();});
  var t = document.createElement('div');
  t.className = 'toast' + (type?' '+type:'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();}, 2500);
}

function setDate() {
  var d = new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('dbadge').textContent = '📅 '+d.charAt(0).toUpperCase()+d.slice(1);
}

setDate();
renderProducts();
setSyncUI('load','Conectando...');
syncNow().then(function() {
  renderProducts();
  renderParciales();
  updateBar();
});
</script>
</body>
</html>
